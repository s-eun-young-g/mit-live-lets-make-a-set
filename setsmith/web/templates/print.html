<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ gig.name }} — set list</title>
  <style>
    body { font-family: Georgia, serif; max-width: 640px; margin: 2rem auto; color: #111; }
    h1 { margin-bottom: .1rem; }
    .meta { color: #666; margin-top: 0; }
    ol { font-size: 1.4rem; line-height: 1.8; padding-left: 2.2rem; }
    .artist { color: #555; font-size: 1rem; }
    .sec { display:inline-block; font-size:.6rem; text-transform:uppercase; color:#999;
           border:1px solid #ddd; border-radius:4px; padding:0 4px; vertical-align:middle; margin-left:.4rem;}
    @media print { .noprint { display:none; } }
  </style>
</head>
<body>
  <h1>{{ gig.name }}</h1>
  <p class="meta">{{ setlist|length }} songs · ~{{ total_minutes }} min</p>
  <ol>
    {% for s in setlist %}
    <li>{{ s.title }} <span class="artist">— {{ s.artist }}</span><span class="sec">{{ s.section }}</span></li>
    {% endfor %}
  </ol>
  <p class="noprint"><button onclick="window.print()">Print</button></p>
</body>
</html>
